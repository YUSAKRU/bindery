pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}
plugins {
    // Lets Gradle auto-provision a JDK 21 toolchain into its own cache
    // (no system-wide JDK install / sudo needed) since some Capacitor
    // plugins (e.g. @capacitor/filesystem) require Java 21.
    id 'org.gradle.toolchains.foojay-resolver-convention' version '0.8.0'
}

include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

apply from: 'capacitor.settings.gradle'